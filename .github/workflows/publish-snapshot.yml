name: Publish Snapshot

on:
  push:
    branches:
      - snapshot
  workflow_dispatch:
    inputs:
      snapshot_build_stamp:
        description: Optional explicit snapshot build stamp
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: publish-snapshot
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout snapshot branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Define Maven settings path
        run: echo "MAVEN_CENTRAL_SETTINGS=$HOME/.m2/settings-central.xml" >> "$GITHUB_ENV"

      - name: Validate snapshot publishing secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          missing=0
          for secret_name in \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_CENTRAL_PASSWORD \
            MAVEN_GPG_PRIVATE_KEY \
            MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing GitHub Actions secret::Required secret '${secret_name}' is not configured. Add it in Settings > Secrets and variables > Actions, then rerun this workflow."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Java 8 and GPG
        uses: actions/setup-java@v5
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Write Central token Maven settings
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          mkdir -p "$HOME/.m2"
          cat > "$MAVEN_CENTRAL_SETTINGS" <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0 https://maven.apache.org/xsd/settings-1.2.0.xsd">
            <servers>
              <server>
                <id>central</id>
                <username>${MAVEN_CENTRAL_USERNAME}</username>
                <password>${MAVEN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Debug Central token Maven settings
        run: |
          settings_path="$MAVEN_CENTRAL_SETTINGS"
          echo "settings_path=$settings_path"
          if [ ! -f "$settings_path" ]; then
            echo "::error title=Missing Maven settings::actions/setup-java did not generate settings.xml"
            exit 1
          fi

          awk '
            /<server>/ {
              in_server=1
              id=""
              has_user=0
              has_pass=0
            }
            /<\/server>/ {
              if (in_server) {
                printf("server id=%s username=%s password=%s\n",
                  id,
                  has_user ? "present" : "missing",
                  has_pass ? "present" : "missing")
              }
              in_server=0
            }
            in_server && /<id>/ {
              line=$0
              sub(/^.*<id>/, "", line)
              sub(/<\/id>.*$/, "", line)
              id=line
            }
            in_server && /<username>/ {
              has_user=1
            }
            in_server && /<password>/ {
              has_pass=1
            }
          ' "$settings_path"

      - name: Build CLI
        run: mvn -B -DskipTests compile

      - name: Ensure signing public key is discoverable
        run: >
          mvn -B -DskipTests exec:java
          -Dexec.args="ensure-gpg-public-key --directory $GITHUB_WORKSPACE"

      - name: Resolve snapshot build stamp
        id: snapshot_build_stamp
        env:
          INPUT_SNAPSHOT_BUILD_STAMP: ${{ inputs.snapshot_build_stamp }}
        run: |
          if [ -n "$INPUT_SNAPSHOT_BUILD_STAMP" ]; then
            value="$INPUT_SNAPSHOT_BUILD_STAMP"
          else
            value="${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}.$(git rev-parse --short HEAD)"
          fi
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Assert snapshot revision
        env:
          JAVACHANGES_SNAPSHOT_BUILD_STAMP: ${{ steps.snapshot_build_stamp.outputs.value }}
        run: |
          mvn -B -DskipTests compile exec:java \
            -Dexec.args="assert-snapshot --directory $GITHUB_WORKSPACE"

      - name: Resolve snapshot publish revision
        id: snapshot_revision
        env:
          JAVACHANGES_SNAPSHOT_BUILD_STAMP: ${{ steps.snapshot_build_stamp.outputs.value }}
        run: |
          current_revision="$(mvn -q -DskipTests compile exec:java -Dexec.args="version --directory $GITHUB_WORKSPACE" | tail -n 1)"
          base_revision="${current_revision%-SNAPSHOT}"
          resolved_revision="${base_revision}-${JAVACHANGES_SNAPSHOT_BUILD_STAMP}-SNAPSHOT"
          echo "value=${resolved_revision}" >> "$GITHUB_OUTPUT"

      - name: Publish snapshot with Central publishing plugin
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          SNAPSHOT_REVISION: ${{ steps.snapshot_revision.outputs.value }}
        run: |
          mvn -B \
            -s "$MAVEN_CENTRAL_SETTINGS" \
            -Pcentral-snapshot-publish \
            -Drevision="${SNAPSHOT_REVISION}" \
            clean deploy
