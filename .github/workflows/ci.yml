name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java 8
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Verify default build
        run: ./mvnw -B verify

      - name: Verify Central publish profile
        run: ./mvnw -B -Pcentral-publish -Dgpg.skip=true verify

      - name: Verify javachanges can plan this repository
        run: ./mvnw -B -DskipTests compile exec:java -Dexec.args="status --directory $GITHUB_WORKSPACE"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build
