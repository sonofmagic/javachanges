name: Publish Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_commit_sha:
        description: Merged release commit SHA to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_commit_sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_commit_sha || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Java 8, Maven Central auth, and GPG
        uses: actions/setup-java@v5
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build CLI
        run: ./mvnw -B -DskipTests compile

      - name: Resolve publish state
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests exec:java
          -Dexec.args="github-release-publish-state --directory $GITHUB_WORKSPACE --fresh true --current-sha $(git rev-parse HEAD)"

      - name: Verify release build before tagging
        if: steps.release.outputs.should_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
        run: |
          ./mvnw -B \
            -Drevision="${RELEASE_VERSION}" \
            verify

      - name: Ensure signing public key is discoverable
        if: steps.release.outputs.should_publish == 'true'
        run: >
          ./mvnw -B -DskipTests exec:java
          -Dexec.args="ensure-gpg-public-key --directory $GITHUB_WORKSPACE"

      - name: Create and push release tag
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests exec:java
          -Dexec.args="github-tag-from-plan --directory $GITHUB_WORKSPACE --fresh true --current-sha $(git rev-parse HEAD) --execute true"

      - name: Publish to Maven Central
        if: steps.release.outputs.should_publish == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
        run: |
          ./mvnw -B \
            -Pcentral-publish \
            -Drevision="${RELEASE_VERSION}" \
            -Dcentral.autoPublish=true \
            -Dcentral.waitUntil=published \
            clean deploy

      - name: Create GitHub release
        if: steps.release.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests exec:java
          -Dexec.args="github-release-from-plan --directory $GITHUB_WORKSPACE --fresh true --release-notes-file target/release-notes.md --execute true"
