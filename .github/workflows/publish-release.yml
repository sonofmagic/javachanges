name: Publish Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_commit_sha:
        description: Merged release commit SHA to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_commit_sha || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_commit_sha || github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Checkout workflow tools
        uses: actions/checkout@v5
        with:
          ref: main
          path: .workflow-tools
          fetch-depth: 1

      - name: Set up Java 8, Maven Central auth, and GPG
        uses: actions/setup-java@v5
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build workflow tools CLI
        working-directory: .workflow-tools
        run: ./mvnw -B -DskipTests compile

      - name: Build CLI
        run: ./mvnw -B -DskipTests compile

      - name: Read release metadata
        id: github_release
        run: |
          release_version="$(
            ./mvnw -q -DskipTests exec:java \
              -Dexec.args="manifest-field --directory $GITHUB_WORKSPACE --field releaseVersion --fresh true"
          )"
          if [ -z "$release_version" ]; then
            echo "::error title=Missing release version::releaseVersion is empty in fresh release metadata"
            exit 1
          fi
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$release_version" >> "$GITHUB_OUTPUT"

      - name: Resolve release state
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.github_release.outputs.release_tag }}
        run: |
          should_publish=true
          tag_sha="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}')"
          release_tag="$(
            gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName 2>/dev/null || true
          )"

          if [ -n "$release_tag" ]; then
            echo "GitHub release ${RELEASE_TAG} already exists. Skipping publish."
            should_publish=false
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            head_sha="$(git rev-parse HEAD)"
            if [ -z "$tag_sha" ]; then
              echo "No release tag ${RELEASE_TAG} exists on this CI success. Skipping publish."
              should_publish=false
            elif [ "$tag_sha" != "$head_sha" ]; then
              echo "::error title=Release tag points at a different commit::${RELEASE_TAG} points at ${tag_sha}, but this CI run checked out ${head_sha}. Move the tag or run Publish Release manually with the intended commit."
              exit 1
            fi
          fi

          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

      - name: Verify release build before tagging
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          RELEASE_VERSION: ${{ steps.github_release.outputs.release_version }}
        run: |
          ./mvnw -B \
            -Drevision="${RELEASE_VERSION}" \
            verify

      - name: Validate publishing secrets
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          missing=0
          for secret_name in \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_CENTRAL_PASSWORD \
            MAVEN_GPG_PRIVATE_KEY \
            MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing GitHub Actions secret::Required secret '${secret_name}' is not configured. Add it in Settings > Secrets and variables > Actions, then rerun this workflow."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Ensure signing public key is discoverable
        if: steps.release_state.outputs.should_publish == 'true'
        working-directory: .workflow-tools
        run: >
          ./mvnw -B -DskipTests exec:java
          -Dexec.args="ensure-gpg-public-key --directory $GITHUB_WORKSPACE"

      - name: Create and push release tag
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests exec:java
          -Dexec.args="github-tag-from-plan --directory $GITHUB_WORKSPACE --fresh true --current-sha $(git rev-parse HEAD) --execute true"

      - name: Publish to Maven Central
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ steps.github_release.outputs.release_version }}
        run: |
          ./mvnw -B \
            -Pcentral-publish \
            -Drevision="${RELEASE_VERSION}" \
            -Dcentral.autoPublish=true \
            -Dcentral.waitUntil=published \
            clean deploy

      - name: Create GitHub release
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          ./mvnw -B -DskipTests exec:java
          -Dexec.args="github-release-from-plan --directory $GITHUB_WORKSPACE --fresh true --release-notes-file target/release-notes.md --execute true"
