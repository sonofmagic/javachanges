name: Publish Release

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      release_commit_sha:
        description: Merged release commit SHA to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.ref == 'changeset-release/main'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_commit_sha || github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Validate publishing secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          missing=0
          for secret_name in \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_CENTRAL_PASSWORD \
            MAVEN_GPG_PRIVATE_KEY \
            MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing GitHub Actions secret::Required secret '${secret_name}' is not configured. Add it in Settings > Secrets and variables > Actions, then rerun this workflow."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Java 8, Maven Central auth, and GPG
        uses: actions/setup-java@v5
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build CLI
        run: mvn -B -DskipTests compile

      - name: Ensure signing public key is discoverable
        run: >
          mvn -B -DskipTests exec:java
          -Dexec.args="ensure-gpg-public-key --directory $GITHUB_WORKSPACE"

      - name: Create and push release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -DskipTests exec:java
          -Dexec.args="github-tag-from-plan --directory $GITHUB_WORKSPACE --execute true"

      - name: Prepare GitHub release metadata
        id: github_release
        run: >
          mvn -B -DskipTests exec:java
          -Dexec.args="github-release-from-plan --directory $GITHUB_WORKSPACE --release-notes-file target/release-notes.md --github-output-file $GITHUB_OUTPUT"

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ steps.github_release.outputs.release_version }}
        run: |
          mvn -B \
            -Pcentral-publish \
            -Drevision="${RELEASE_VERSION}" \
            -Dcentral.autoPublish=true \
            -Dcentral.waitUntil=published \
            clean deploy

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -DskipTests exec:java
          -Dexec.args="github-release-from-plan --directory $GITHUB_WORKSPACE --release-notes-file target/release-notes.md --execute true"
