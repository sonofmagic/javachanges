name: Publish Release

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'changeset-release/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merged release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Validate publishing secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          missing=0
          for secret_name in \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_CENTRAL_PASSWORD \
            MAVEN_GPG_PRIVATE_KEY \
            MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!secret_name}" ]; then
              echo "::error title=Missing GitHub Actions secret::Required secret '${secret_name}' is not configured. Add it in Settings > Secrets and variables > Actions, then rerun this workflow."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Java 8, Maven Central auth, and GPG
        uses: actions/setup-java@v5
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build CLI
        run: mvn -B -DskipTests compile

      - name: Read release version
        id: release_version
        run: |
          value="$(mvn -q -DskipTests exec:java -Dexec.args="manifest-field --directory $GITHUB_WORKSPACE --field releaseVersion" | tail -n 1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          mvn -B -DskipTests exec:java
          -Dexec.args="github-tag-from-plan --directory $GITHUB_WORKSPACE --execute true"

      - name: Generate release notes
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.md
        run: >
          mvn -B -DskipTests exec:java
          -Dexec.args="release-notes --directory $GITHUB_WORKSPACE --tag v${RELEASE_VERSION} --output ${RELEASE_NOTES_FILE}"

      - name: Publish to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
        run: |
          mvn -B \
            -Pcentral-publish \
            -Drevision="${RELEASE_VERSION}" \
            -Dcentral.autoPublish=true \
            -Dcentral.waitUntil=published \
            clean deploy

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.md
        run: |
          tag="v${RELEASE_VERSION}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$tag" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            gh release create "$tag" \
              --title "$tag" \
              --notes-file "$RELEASE_NOTES_FILE"
          fi
