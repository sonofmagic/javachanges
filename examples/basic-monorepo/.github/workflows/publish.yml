name: Publish Release

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

env:
  JAVACHANGES_VERSION: "REPLACE_WITH_PUBLISHED_VERSION"
  MAVEN_RELEASE_REPOSITORY_URL: ${{ vars.MAVEN_RELEASE_REPOSITORY_URL }}
  MAVEN_SNAPSHOT_REPOSITORY_URL: ${{ vars.MAVEN_SNAPSHOT_REPOSITORY_URL }}
  MAVEN_RELEASE_REPOSITORY_ID: ${{ vars.MAVEN_RELEASE_REPOSITORY_ID }}
  MAVEN_SNAPSHOT_REPOSITORY_ID: ${{ vars.MAVEN_SNAPSHOT_REPOSITORY_ID }}
  MAVEN_REPOSITORY_USERNAME: ${{ secrets.MAVEN_REPOSITORY_USERNAME }}
  MAVEN_REPOSITORY_PASSWORD: ${{ secrets.MAVEN_REPOSITORY_PASSWORD }}

jobs:
  publish:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.ref == 'changeset-release/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Download javachanges CLI
        run: >
          mvn -B -q org.apache.maven.plugins:maven-dependency-plugin:3.8.1:copy
          -Dartifact=io.github.sonofmagic:javachanges:${JAVACHANGES_VERSION}:jar
          -DoutputDirectory=.tools

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read release version
        id: release_version
        run: |
          value="$(java -jar .tools/javachanges-${JAVACHANGES_VERSION}.jar manifest-field --directory "$GITHUB_WORKSPACE" --field releaseVersion | tail -n 1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Create local release tag
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
        run: |
          tag="v${RELEASE_VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally."
          else
            git tag -a "$tag" -m "Release $tag"
          fi

      - name: Publish
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
        run: |
          java -jar .tools/javachanges-${JAVACHANGES_VERSION}.jar \
            publish \
            --directory "$GITHUB_WORKSPACE" \
            --tag "v${RELEASE_VERSION}" \
            --execute true

      - name: Push git tag
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
        run: |
          git push origin "v${RELEASE_VERSION}"
