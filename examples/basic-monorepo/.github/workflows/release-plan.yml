name: Release Plan

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  JAVACHANGES_VERSION: "REPLACE_WITH_PUBLISHED_VERSION"

jobs:
  release-pr:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '8'
          cache: maven
          cache-dependency-path: pom.xml

      - name: Download javachanges CLI
        run: >
          mvn -B -q org.apache.maven.plugins:maven-dependency-plugin:3.8.1:copy
          -Dartifact=io.github.sonofmagic:javachanges:${JAVACHANGES_VERSION}:jar
          -DoutputDirectory=.tools

      - name: Apply release plan
        run: java -jar .tools/javachanges-${JAVACHANGES_VERSION}.jar plan --directory "$GITHUB_WORKSPACE" --apply true

      - name: Read release version
        if: hashFiles('.changesets/release-plan.json') != ''
        id: release_version
        run: |
          value="$(java -jar .tools/javachanges-${JAVACHANGES_VERSION}.jar manifest-field --directory "$GITHUB_WORKSPACE" --field releaseVersion | tail -n 1)"
          echo "value=$value" >> "$GITHUB_OUTPUT"

      - name: Commit release plan
        if: hashFiles('.changesets/release-plan.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="changeset-release/main"
          title="chore(release): v${RELEASE_VERSION}"
          git switch -C "$branch"
          git add pom.xml CHANGELOG.md .changesets
          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 0
          fi
          git commit -m "chore(release): apply changesets for v${RELEASE_VERSION}"
          git push --force-with-lease origin "HEAD:${branch}"

          pr_number="$(gh pr list --base main --head "$branch" --json number --jq '.[0].number')"
          if [ -z "$pr_number" ]; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "$title" \
              --body-file .changesets/release-plan.md
          else
            gh pr edit "$pr_number" \
              --title "$title" \
              --body-file .changesets/release-plan.md
          fi
