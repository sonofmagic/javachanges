name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  JAVACHANGES_VERSION: "REPLACE_WITH_PUBLISHED_VERSION"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download javachanges CLI
        run: |
          mkdir -p .tools
          curl -fsSL -o .tools/javachanges-${JAVACHANGES_VERSION}.jar https://repo1.maven.org/maven2/io/github/sonofmagic/javachanges/${JAVACHANGES_VERSION}/javachanges-${JAVACHANGES_VERSION}.jar

      - name: Verify build
        run: gradle build

      - name: Inspect release state
        run: java -jar .tools/javachanges-${JAVACHANGES_VERSION}.jar status --directory "$GITHUB_WORKSPACE"
